unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s
# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'chriszarate/tmux-tasks'


# Task manager
set -g @tasks_manager 'taskwarrior'

# Colors
set -g @tasks_format_begin '#[fg=white]'
set -g @tasks_format_end '#[fg=white]'

# Icons
set -g @tasks_icon_urgent '⧗ '
set -g @tasks_icon_outstanding '+'
# Style
cyan="#18848e"
green="#809575"

set -g base-index 1
setw -g pane-base-index 1
set -g pane-border-lines heavy
set-option -g status-position top
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g status-style bg=default
set -g status-left-length 100
set -g status-left "#[bold]  #S | "
set -g window-status-current-format "#[fg=${green}, bold] #I:#W"
set -g status-right "#{tasks_status} #[fg=${green}, bold]󱃾 #(/bin/bash $HOME/.tmux/plugins/kube-tmux/kube.tmux) "


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
run '~/.tmux/plugins/tpm/tpm'

set -g status-style bg=default
set -g status-bg default
